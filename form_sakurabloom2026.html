<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>- SAKURA BLOOM 2026 - | Cebu Trip Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #fff5f7;
            color: #4a4a4a;
            overflow-x: hidden;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 182, 193, 0.4);
            position: relative;
            z-index: 10;
        }

        .btn-primary {
            background: linear-gradient(90deg, #ff9a9e 0%, #fecfef 100%);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
        }

        /* 桜のアニメーション設定 */
        .petal {
            position: fixed;
            top: -50px;
            pointer-events: none;
            z-index: 1;
            /* 基本の落下アニメーション */
            animation: fall linear forwards;
        }

        /* 花びらの形（疑似要素で作成） */
        .petal::after {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            background-color: #ffb7c5;
            border-radius: 100% 0 100% 0;
            /* 左右に揺れるアニメーション */
            animation: sway ease-in-out infinite;
        }

        /* 落下アニメーション */
        @keyframes fall {
            0% {
                transform: translateY(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh);
                opacity: 0;
            }
        }

        /* 左右への揺れと回転 */
        @keyframes sway {
            0%, 100% {
                transform: translateX(0) rotate(0deg);
            }
            50% {
                transform: translateX(50px) rotate(180deg);
            }
        }

        /* ラジオボタンのカスタムスタイル */
        input[type="radio"]:checked + label {
            background-color: #fff1f2;
            border-color: #f472b6;
            color: #db2777;
        }
    </style>
</head>
<body class="min-h-screen relative">

    <div class="container mx-auto px-4 py-12 relative z-10">
        <!-- ヘッダー -->
        <header class="text-center mb-12">
            <h1 class="text-3xl md:text-5xl font-bold text-pink-500 mb-2 tracking-tight">
                - SAKURA BLOOM 2026 -
            </h1>
            <p class="text-pink-400 font-medium text-sm md:text-base mb-4 italic">
                Produced by Flower Angel
            </p>
            <div class="w-24 h-1 bg-pink-300 mx-auto rounded-full"></div>
            <p class="mt-6 text-gray-700 max-w-lg mx-auto leading-relaxed">
                日本からセブへお越しいただく皆様へ。<br>
                スムーズな運営のため、渡航情報のご登録をお願いいたします。
            </p>
        </header>

        <!-- メインコンテンツ / フォーム -->
        <main class="max-w-2xl mx-auto">
            <div class="form-card rounded-3xl shadow-xl p-8 md:p-12">
                <h2 class="text-2xl font-bold mb-8 text-center text-gray-800 border-b pb-4">
                    Registration Form
                </h2>

                <form action="https://formspree.io/f/mldkgdpq" method="POST" class="space-y-6">
                    
                    <!-- 紹介者 -->
                    <div class="group">
                        <label for="referrer" class="block text-sm font-bold text-gray-700 mb-2 group-focus-within:text-pink-500 transition-colors">
                            Referrer (紹介者)
                        </label>
                        <input type="text" id="referrer" name="Referrer" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-pink-400 focus:ring-2 focus:ring-pink-100 outline-none transition-all placeholder-gray-300"
                            placeholder="Name of the person who introduced you">
                    </div>

                    <!-- 到着情報 -->
                    <div class="group">
                        <label for="arrival" class="block text-sm font-bold text-gray-700 mb-2 group-focus-within:text-pink-500 transition-colors">
                            Arrival Date / Flight (到着日・便名)
                        </label>
                        <input type="text" id="arrival" name="Arrival_Info" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-pink-400 focus:ring-2 focus:ring-pink-100 outline-none transition-all placeholder-gray-300"
                            placeholder="e.g. March 27, PR433 at 3:00 PM" required>
                    </div>

                    <!-- 出発情報 -->
                    <div class="group">
                        <label for="departure" class="block text-sm font-bold text-gray-700 mb-2 group-focus-within:text-pink-500 transition-colors">
                            Departure Date / Flight (出発日・便名)
                        </label>
                        <input type="text" id="departure" name="Departure_Info" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-pink-400 focus:ring-2 focus:ring-pink-100 outline-none transition-all placeholder-gray-300"
                            placeholder="e.g. March 30, PR434 at 9:00 PM" required>
                    </div>

                    <!-- 宿泊施設 -->
                    <div class="group">
                        <label for="hotel" class="block text-sm font-bold text-gray-700 mb-2 group-focus-within:text-pink-500 transition-colors">
                            Accommodation (宿泊ホテル名)
                        </label>
                        <input type="text" id="hotel" name="Accommodation" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-pink-400 focus:ring-2 focus:ring-pink-100 outline-none transition-all placeholder-gray-300"
                            placeholder="Name of your hotel" required>
                    </div>

                    <!-- 28日ツアー参加有無 -->
                    <div class="pt-4 border-t border-gray-100">
                        <label class="block text-sm font-bold text-gray-700 mb-4 transition-colors">
                            Are you joining the Cruising Tour on March 28th? (28日のツアーに参加しますか？)
                        </label>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="relative">
                                <input type="radio" id="tour_yes" name="March_28_Tour" value="Yes" class="hidden peer">
                                <label for="tour_yes" class="flex items-center justify-center px-4 py-3 rounded-xl border border-gray-200 cursor-pointer hover:border-pink-200 transition-all font-medium text-gray-600 peer-checked:border-pink-500 peer-checked:bg-pink-50 peer-checked:text-pink-600">
                                    Yes (参加する)
                                </label>
                            </div>
                            <div class="relative">
                                <input type="radio" id="tour_no" name="March_28_Tour" value="No" class="hidden peer">
                                <label for="tour_no" class="flex items-center justify-center px-4 py-3 rounded-xl border border-gray-200 cursor-pointer hover:border-pink-200 transition-all font-medium text-gray-600 peer-checked:border-pink-500 peer-checked:bg-pink-50 peer-checked:text-pink-600">
                                    No (参加しない)
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- 連絡先 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- 電話番号 -->
                        <div class="group">
                            <label for="phone" class="block text-sm font-bold text-gray-700 mb-2 group-focus-within:text-pink-500 transition-colors">
                                Phone Number (電話番号)
                            </label>
                            <input type="tel" id="phone" name="Phone_Number" 
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-pink-400 focus:ring-2 focus:ring-pink-100 outline-none transition-all placeholder-gray-300"
                                placeholder="090-0000-0000">
                        </div>

                        <!-- メールアドレス -->
                        <div class="group">
                            <label for="email" class="block text-sm font-bold text-gray-700 mb-2 group-focus-within:text-pink-500 transition-colors">
                                Email (メールアドレス)
                            </label>
                            <input type="email" id="email" name="Email_Address" 
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-pink-400 focus:ring-2 focus:ring-pink-100 outline-none transition-all placeholder-gray-300"
                                placeholder="example@mail.com">
                        </div>
                    </div>

                    <!-- チケット枚数 -->
                    <div class="group">
                        <label for="tickets" class="block text-sm font-bold text-gray-700 mb-2 group-focus-within:text-pink-500 transition-colors">
                            Sutadon Pay It Forward Ticket(s) (すた丼 恩送りチケット枚数)
                        </label>
                        <div class="flex items-center space-x-4">
                            <input type="number" id="tickets" name="Sutadon_Ticket_Count" min="0" value="0"
                                class="w-32 px-4 py-3 rounded-xl border border-gray-200 focus:border-pink-400 focus:ring-2 focus:ring-pink-100 outline-none transition-all">
                            <span class="text-gray-500">枚</span>
                        </div>
                    </div>

                    <!-- 送信ボタン -->
                    <div class="pt-6">
                        <button type="submit" 
                            class="btn-primary w-full py-4 rounded-xl text-white font-bold text-lg shadow-lg">
                            登録内容を送信する (Submit)
                        </button>
                    </div>

                </form>
            </div>

            <!-- フッター案内テキスト -->
            <div class="mt-12 space-y-6 text-center text-sm text-gray-500">
                <p>※送信後、Formspreeの確認画面が表示される場合があります。</p>
                
                <div class="py-4">
                    <a href="https://flowerangelhk.com/" target="_blank" class="inline-flex items-center text-pink-500 hover:text-pink-700 transition-colors font-medium border-b border-pink-200 hover:border-pink-500 pb-1">
                        Flower Angel HK Official Website
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                        </svg>
                    </a>
                </div>

                <p>© 2026 Flower Angel HK. All rights reserved.</p>
            </div>
        </main>
    </div>

    <script>
        // 桜の花びらの色（バリエーション）
        const colors = ['#ffb7c5', '#ffc0cb', '#ffe4e1', '#fff0f5', '#ffd1dc'];

        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            
            // ランダムなサイズ (10px - 20px)
            const size = Math.random() * 10 + 10;
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            
            // ランダムな開始位置（画面の横幅全体）
            petal.style.left = Math.random() * 100 + 'vw';
            
            // アニメーション設定
            const fallDuration = Math.random() * 6 + 7; // 落下時間 7s - 13s
            const swayDuration = Math.random() * 2 + 2; // 揺れ時間 2s - 4s
            const delay = Math.random() * 5;           // 遅延 0s - 5s
            
            petal.style.animationDuration = `${fallDuration}s`;
            petal.style.animationDelay = `${delay}s`;

            // 花びら本体（揺れ）の設定
            const leaf = document.createElement('div');
            leaf.className = 'petal-inner'; // スタイルはCSSの .petal::after を継承するように調整
            
            // 個別に色をランダム設定
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            // カスタムスタイルの適用（疑似要素の代わりにより柔軟に制御）
            petal.innerHTML = `
                <div style="
                    width: 100%;
                    height: 100%;
                    background-color: ${color};
                    border-radius: 100% 0 100% 0;
                    animation: sway ${swayDuration}s ease-in-out infinite;
                "></div>
            `;

            document.body.appendChild(petal);

            // アニメーション終了後に要素を削除してメモリを節約
            setTimeout(() => {
                petal.remove();
            }, (fallDuration + delay) * 1000);
        }

        // 定期的に生成
        setInterval(createPetal, 400);

        // 初回ロード時にもいくつか生成
        for(let i=0; i<15; i++) {
            createPetal();
        }
    </script>
</body>
</html>
